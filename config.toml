[llama_cpp]
# If set, wins over PATH and the bin/ subdir. Can be a directory or a direct exe path.
binary_path_override = ""
bin_subdir = "bin"

[models]
# Used when a profile gives a bare filename instead of an absolute path.
default_dir = "models"

[output]
default_mode = "in_place"   # in_place | output_dir
# Used when default_mode = "output_dir" and --output-dir is not supplied.
default_dir = "captions"
overwrite = false
recursive = false

[generation]
# Per-image request timeout safety net (seconds).
timeout_seconds = 300
# How long to wait for llama-server to load the model and report healthy
# before giving up (seconds). Larger GGUFs need more time.
server_startup_timeout_seconds = 120

[logging]
level = "INFO"

[preprocessing]
# Target megapixels to resize images to before captioning. 0 = disabled.
# --size on the CLI overrides this per-run.
resize_megapixels = 0.0
