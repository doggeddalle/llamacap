[profile]
name = "krea2"
description = "Natural-language LoRA captioning profile using Qwen3-VL-4B-Instruct (abliterated) for Krea/FLUX-style training data."

[model]
# Set gguf_path/mmproj_path (absolute) or gguf_file/mmproj_file (bare filename
# under [models].default_dir) below, or pass --model DIR at the command line.
# See README.md "Setting the model" for details.
gguf_path = ""
mmproj_path = ""
gguf_file = "Qwen3-VL-4B-Instruct-Unredacted-MAX.Q8_0.gguf"
mmproj_file = "Qwen3-VL-4B-Instruct-Unredacted-MAX.mmproj-q8_0.gguf"

[prompt]
# Relative to the project root. `text`, if non-empty, overrides `file`.
file = "prompts/krea2_caption.txt"
text = ""

[trigger_word]
# Empty string disables the trigger word.
value = ""
placement = "prefix_comma"

[generation]
ctx_size = 8192
n_predict = 220
temperature = 0.7
top_p = 0.9
top_k = 40
repeat_penalty = 1.1
ngl = 99
image_min_tokens = 1024
seed = 1337
no_warmup = true
extra_args = []

[output]
suffix = ".txt"
